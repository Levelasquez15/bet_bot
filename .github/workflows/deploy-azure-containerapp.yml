name: Deploy Telegram Bot to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/bet-bot:${{ github.sha }}
          containerAppName: ${{ vars.CONTAINER_APP_NAME }}
          acrName: ${{ vars.ACR_NAME }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
